# ============================================================
# Nginx Configuration for TalentDiscover App
#
# WHY NGINX IN FRONT OF NEXT.JS?
# Next.js has its own HTTP server, but nginx adds:
#
# 1. HTTPS/SSL termination: Handle TLS in nginx, plain HTTP internally
#    (Next.js doesn't need to deal with certificates)
# 2. Gzip compression: Reduce response size by 60-80% (nginx does it better)
# 3. Static file serving: nginx serves /public files without hitting Node.js
# 4. Rate limiting: Protect against DDoS and brute force
# 5. Request buffering: Nginx queues slow clients, protecting Node.js
# 6. Load balancing: If you add more app servers later
# 7. Access logging: Separate logs from app logs
#
# ARCHITECTURE: Client → Nginx:80/443 → Node.js:3000
# ============================================================

# ---- Main context ----
user nginx;

# Auto-detect CPU cores for worker processes
# More workers = handle more concurrent connections
worker_processes auto;

# Error log location and level
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

# ---- Events context ----
events {
    # Max connections per worker (worker_processes × worker_connections = max total)
    # 1024 is a safe default for a t3.micro
    worker_connections 1024;

    # Accept multiple connections at once (better performance)
    multi_accept on;
}

# ---- HTTP context ----
http {
    # Standard MIME types mapping (file extension → Content-Type header)
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---- LOGGING ----
    # Log format includes response time — useful for performance debugging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ---- PERFORMANCE ----
    # sendfile: Use kernel-level file transfer (faster than read+write)
    sendfile on;
    # tcp_nopush: Send headers and beginning of file in one packet
    tcp_nopush on;
    # tcp_nodelay: Don't buffer small packets (good for streaming responses)
    tcp_nodelay on;

    # Keep connections open for multiple requests (reduces TCP overhead)
    keepalive_timeout 65;

    # ---- GZIP COMPRESSION ----
    # Compress responses to save bandwidth and speed up page loads
    # Compresses JSON, HTML, CSS, JS by ~60-80%
    gzip on;
    gzip_vary on;       # Add Vary: Accept-Encoding header
    gzip_proxied any;   # Compress proxied responses too
    gzip_comp_level 6;  # Balance between speed and compression (1-9)
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ---- SECURITY HEADERS ----
    # X-Frame-Options: Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    # X-Content-Type-Options: Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy: Control how much referrer info is sent
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- UPSTREAM: Next.js App ----
    # Define the backend servers to proxy to
    # In the future, add more servers here for load balancing:
    # server 127.0.0.1:3001;
    # server 127.0.0.1:3002;
    upstream nextjs_app {
        server 127.0.0.1:3000;  # Next.js standalone server
        keepalive 32;           # Keep 32 connections open to upstream
    }

    # ---- SERVER BLOCK: HTTP ----
    server {
        listen 80;
        server_name _;  # Match any hostname; use your domain in production

        # Max upload size (for file uploads, API payloads)
        client_max_body_size 10M;

        # ---- STATIC FILES ----
        # Serve Next.js static assets directly from nginx (bypasses Node.js)
        # These files are immutable (content-hashed filenames)
        location /_next/static/ {
            alias /var/www/talent-app/.next/static/;
            # Cache for 1 year — files never change (immutable hashes in filename)
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;  # Don't log static file requests (too noisy)
        }

        # Public folder files (favicon, images, etc.)
        location /public/ {
            alias /var/www/talent-app/public/;
            expires 7d;
            access_log off;
        }

        # ---- HEALTH CHECK ----
        # Used by load balancers, monitoring, and deployment scripts
        # Returns 200 OK quickly without hitting the app
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ---- PROXY TO NEXT.JS ----
        location / {
            proxy_pass http://nextjs_app;

            # HTTP/1.1 required for:
            # - WebSocket connections (dev hot reload)
            # - Server-Sent Events (streaming roadmap)
            # - Keepalive connections (performance)
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Pass real client information to Next.js
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;  # 'http' or 'https'

            # Timeouts — increase for AI endpoints (Gemini calls can take 10-30s)
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;  # 2 min for AI streaming responses
            proxy_send_timeout    120s;

            # Buffer settings — disable for streaming (SSE, real-time)
            # proxy_buffering off;  # Uncomment for streaming responses
        }
    }

    # ---- MAP: WebSocket connection upgrade ----
    # Handles WebSocket upgrade gracefully
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
